---
# Global customizations applied to all images
global_customizations:
  # - artifact: ca-cert
  #   paths:
  #     - src: /etc/ssl/certs/ca-certificates.crt
  #       dest: /etc/ssl/certs/ca-certificates.crt

maintainer: "Tomasz Gągor <https://gagor.pro>"

images:
  # alpine-base:
  #   platforms:
  #     - linux/amd64
  #     - linux/arm64
  #   os:
  #     - alpine-3.23
  #   tags:
  #     - "3.23"
  #   # Per-image customizations
  #   customizations: []

  amazoncorretto:
    platforms:
      - linux/amd64
      # - linux/arm64
    os:
      - alpine-3.23
      - debian-13
    tags:
      - "17"
      - "21"
      - "25"
    customizations: []

  node:
    platforms:
      - linux/amd64
      # - linux/arm64
    os:
      # - alpine-3.23
      - debian-13
    tags:
      # - "24"
      # - "24-sfw"
      - "26"
      - "26-sfw"
    customizations:
      - artifact: npmrc
        paths:
          - src: /root/.npmrc
            dest: /root/.npmrc

  python:
    platforms:
      - linux/amd64
      # - linux/arm64
    os:
      - alpine-3.23
      - debian-13
    tags:
      # - "3.12"
      # - "3.12-sfw"
      # - "3.13"
      # - "3.13-sfw"
      - "3.14"
      - "3.14-sfw"
    customizations:
      - artifact: pip-conf
        paths:
          - src: /etc/pip.conf
            dest: /etc/pip.conf

  uv:
    platforms:
      - linux/amd64
      # - linux/arm64
    os:
      - debian-13
    tags:
      - "0"
