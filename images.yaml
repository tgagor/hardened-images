---
# Global customizations applied to all images
global_customizations:
  # - artifact: ca-cert
  #   paths:
  #     - src: /etc/ssl/certs/ca-certificates.crt
  #       dest: /etc/ssl/certs/ca-certificates.crt

images:
  alpine-base:
    platforms:
      - linux/amd64
      - linux/arm64
    os:
      - alpine-3.23
    tags:
      - "3.23"
    # Per-image customizations
    customizations:
      - artifact: npmrc
        paths:
          - src: /root/.npmrc
            dest: /root/.npmrc

  amazoncorretto:
    platforms:
      - linux/amd64
      - linux/arm64
    os:
      - alpine-3.23
      - debian-13
    tags:
      - "17"
      - "21"
      - "25"
    customizations:
      - artifact: npmrc
        paths:
          - src: /root/.npmrc
            dest: /root/.npmrc
