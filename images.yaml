      #   paths:
      #     - src: /root/.npmrc
      #       dest: /root/.npmrc

  amazoncorretto:
    # platforms:
    #   - linux/amd64
    #   - linux/arm64
    os:
      - alpine-3.23
      - debian-13
    variants:
      - 17
      - 17-dev
      - 21
      - 21-dev
      - 25
      - 25-dev
    customizations:
      - artifact: npmrc
        paths:
          - src: /root/.npmrc
            dest: /root/.npmrc
