---
# OCI Artifacts for DHI Customizations
# Each artifact is a minimal Docker image (FROM scratch) containing files to add to DHI images
artifacts:
  npmrc:
    description: "Custom .npmrc configuration with proxy settings"
    dockerfile: "customizations/npmrc/Dockerfile"
    push: true
    platforms:
      - linux/amd64
      - linux/arm64
  pip-conf:
    description: "Custom pip.conf configuration with proxy settings"
    dockerfile: "customizations/pip-conf/Dockerfile"
    push: true
    platforms:
      - linux/amd64
      - linux/arm64
  # Example of another customization:
